<style>
  .phone{width:320px;margin:0 auto;background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:32px;overflow:hidden;font-size:14px}
  .logo-area{background:#0a0a0a;padding:40px 20px 32px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .logo-mark{width:72px;height:72px;position:relative;display:flex;align-items:center;justify-content:center}
  .brand-name{font-size:15px;font-weight:700;color:#E8A020;letter-spacing:0.05em;text-align:center;line-height:1.3}
  .tagline{font-size:11px;color:#888;font-style:italic;margin-top:-6px}
  .form-area{padding:28px 20px 24px}
  .form-title{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
  .form-subtitle{font-size:12px;color:var(--color-text-tertiary);margin-bottom:24px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em}
  .field input{width:100%;box-sizing:border-box;padding:10px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary)}
  .password-wrap{position:relative}
  .password-wrap input{padding-right:40px}
  .eye-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--color-text-tertiary);font-size:16px;cursor:pointer}
  .login-btn{width:100%;padding:13px;background:#E8A020;color:#0a0a0a;border:none;border-radius:var(--border-radius-md);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:0.02em}
  .footer-note{text-align:center;margin-top:20px;font-size:11px;color:var(--color-text-tertiary)}
</style>
<h2 class="sr-only">Login screen wireframe for Roam and Rove Xpeditions</h2>
<div class="phone">
  <div class="logo-area">
    <svg width="72" height="72" viewBox="0 0 100 100">
      <polygon points="50,18 58,38 50,32 42,38" fill="#E8A020"/>
      <path d="M30,20 Q38,35 50,32 Q62,35 70,20 Q65,50 50,68 Q35,50 30,20Z" fill="none" stroke="white" stroke-width="5" stroke-linejoin="round"/>
      <path d="M38,20 Q42,40 50,48 Q58,40 62,20" fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
      <path d="M44,72 Q48,78 50,80 Q52,78 56,72" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <div class="brand-name">ROAM AND ROVE<br>XPEDITIONS</div>
    <div class="tagline">Travel Beyond Ordinary</div>
  </div>
  <div class="form-area">
    <div class="form-title">Welcome back</div>
    <div class="form-subtitle">Sign in to your account to continue</div>
    <div class="field">
      <label>Username</label>
      <input type="text" placeholder="Enter your username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" placeholder="Enter your password"/>
        <i class="ti ti-eye eye-icon" aria-label="Show password"></i>
      </div>
    </div>
    <button class="login-btn">Sign in</button>
    <div class="footer-note">Contact your administrator if you need access</div>
  </div>
</div>
