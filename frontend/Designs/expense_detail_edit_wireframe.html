<style>
  .phone{width:320px;margin:0 auto;background:var(--color-background-primary);border:1px solid var(--color-border-secondary);border-radius:32px;overflow:hidden;font-size:14px}
  .topbar{background:var(--color-background-secondary);padding:12px 16px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--color-border-tertiary)}
  .topbar-title{font-size:15px;font-weight:500;color:var(--color-text-primary);flex:1;text-align:center}
  .back{color:var(--color-text-secondary);font-size:13px;display:flex;align-items:center;gap:4px;cursor:pointer}
  .body{padding:16px}
  .amount-hero{text-align:center;padding:18px 0 14px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:16px}
  .amount-value{font-size:32px;font-weight:500;color:#085041}
  .amount-label{font-size:12px;color:var(--color-text-tertiary);margin-top:2px}
  .detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
  .detail-row:last-of-type{border-bottom:none}
  .detail-label{font-size:12px;color:var(--color-text-secondary);padding-top:1px}
  .detail-value{font-size:13px;color:var(--color-text-primary);font-weight:500;text-align:right;max-width:180px}
  .detail-value.muted{font-weight:400;color:var(--color-text-secondary)}
  .pay-badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
  .mpesa{background:#E1F5EE;color:#085041}
  .actions{margin-top:20px;display:flex;flex-direction:column;gap:8px}
  .edit-btn{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .delete-btn{width:100%;padding:11px;background:var(--color-background-primary);color:var(--color-text-danger);border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
  .task-chip{background:#E6F1FB;color:#0C447C;font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500}
</style>
<h2 class="sr-only">Expense detail and edit screen wireframe for the driver role</h2>
<div class="phone">
  <div style="background:#1D9E75;padding:10px 16px 8px;display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:#E1F5EE">Roam & Rove</span>
    <span style="font-size:12px;color:#9FE1CB">James Kamau</span>
  </div>
  <div class="topbar">
    <span class="back"><i class="ti ti-arrow-left" style="font-size:16px" aria-hidden="true"></i> Back</span>
    <span class="topbar-title">Expense detail</span>
    <span style="width:40px"></span>
  </div>
  <div class="body">
    <div class="amount-hero">
      <div class="amount-value">KES 3,500</div>
      <div class="amount-label">18 May 2026 · 09:42 AM</div>
    </div>
    <div class="detail-row">
      <span class="detail-label">Expense type</span>
      <span class="detail-value">Fuel</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Payment method</span>
      <span class="pay-badge mpesa">M-Pesa</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Linked task</span>
      <span class="task-chip">Nairobi airport run</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Description</span>
      <span class="detail-value muted">Fueled up at Total Langata road before airport run</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Submitted by</span>
      <span class="detail-value">James Kamau</span>
    </div>
    <div class="actions">
      <button class="edit-btn">
        <i class="ti ti-edit" style="font-size:16px" aria-hidden="true"></i>
        Edit expense
      </button>
      <button class="delete-btn">
        <i class="ti ti-trash" style="font-size:16px" aria-hidden="true"></i>
        Delete expense
      </button>
    </div>
  </div>
</div>
